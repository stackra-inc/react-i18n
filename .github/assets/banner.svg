<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient: sky blue → indigo → purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Text gradient for package name -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="60%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Globe glow -->
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0" />
    </radialGradient>
    <!-- Code block gradient -->
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="12" />

  <!-- Grid pattern overlay -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="60"  y1="0" x2="60"  y2="280" />
    <line x1="120" y1="0" x2="120" y2="280" />
    <line x1="180" y1="0" x2="180" y2="280" />
    <line x1="240" y1="0" x2="240" y2="280" />
    <line x1="300" y1="0" x2="300" y2="280" />
    <line x1="360" y1="0" x2="360" y2="280" />
    <line x1="420" y1="0" x2="420" y2="280" />
    <line x1="480" y1="0" x2="480" y2="280" />
    <line x1="540" y1="0" x2="540" y2="280" />
    <line x1="600" y1="0" x2="600" y2="280" />
    <line x1="660" y1="0" x2="660" y2="280" />
    <line x1="720" y1="0" x2="720" y2="280" />
    <line x1="780" y1="0" x2="780" y2="280" />
    <line x1="840" y1="0" x2="840" y2="280" />
    <!-- Horizontal lines -->
    <line x1="0" y1="40"  x2="900" y2="40"  />
    <line x1="0" y1="80"  x2="900" y2="80"  />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="240" x2="900" y2="240" />
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)" rx="2" />
  <!-- Bottom accent line -->
  <rect x="0" y="277" width="900" height="3" fill="url(#accentGrad)" rx="2" />

  <!-- ── Globe / Translation Icon (left side) ── -->
  <!-- Glow halo -->
  <circle cx="100" cy="140" r="70" fill="url(#globeGlow)" />
  <!-- Globe circle -->
  <circle cx="100" cy="140" r="44" fill="none" stroke="#38bdf8" stroke-width="1.8" opacity="0.9" />
  <!-- Equator -->
  <ellipse cx="100" cy="140" rx="44" ry="16" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.6" />
  <!-- Vertical meridian -->
  <ellipse cx="100" cy="140" rx="22" ry="44" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.6" />
  <!-- Latitude lines -->
  <ellipse cx="100" cy="122" rx="38" ry="10" fill="none" stroke="#818cf8" stroke-width="0.9" opacity="0.5" />
  <ellipse cx="100" cy="158" rx="38" ry="10" fill="none" stroke="#818cf8" stroke-width="0.9" opacity="0.5" />
  <!-- Vertical axis -->
  <line x1="100" y1="96" x2="100" y2="184" stroke="#38bdf8" stroke-width="1.2" opacity="0.5" />
  <!-- Translation "A → あ" label inside globe -->
  <text x="100" y="136" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" opacity="0.95">A</text>
  <text x="100" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.8">→ あ</text>

  <!-- ── Main content (center-left) ── -->
  <!-- Package name -->
  <text x="175" y="105" font-family="'Courier New', Courier, monospace" font-size="32" font-weight="700" fill="url(#textGrad)">@stackra/i18n</text>

  <!-- Description -->
  <text x="175" y="133" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Comprehensive i18n Vite plugin with i18next, auto-globbing &amp; type generation</text>

  <!-- Feature badges -->
  <!-- i18next badge -->
  <rect x="175" y="148" width="62" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="206" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">i18next</text>

  <!-- Type-Safe badge -->
  <rect x="244" y="148" width="72" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
  <text x="280" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">Type-Safe</text>

  <!-- Auto-Glob badge -->
  <rect x="323" y="148" width="72" height="22" rx="11" fill="#2e1065" stroke="#c084fc" stroke-width="1" />
  <text x="359" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">Auto-Glob</text>

  <!-- HMR badge -->
  <rect x="402" y="148" width="46" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="425" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">HMR</text>

  <!-- Vite Plugin badge -->
  <rect x="455" y="148" width="80" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
  <text x="495" y="163" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">Vite Plugin</text>

  <!-- Version badge -->
  <rect x="175" y="178" width="56" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="203" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">v1.0.0</text>

  <!-- ── Code snippet (right side) ── -->
  <rect x="560" y="30" width="320" height="220" rx="8" fill="url(#codeGrad)" stroke="#334155" stroke-width="1" />
  <!-- Code window dots -->
  <circle cx="580" cy="50" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="596" cy="50" r="5" fill="#f59e0b" opacity="0.8" />
  <circle cx="612" cy="50" r="5" fill="#22c55e" opacity="0.8" />
  <!-- File label -->
  <text x="660" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">vite.config.ts</text>
  <!-- Divider -->
  <line x1="560" y1="62" x2="880" y2="62" stroke="#334155" stroke-width="1" />

  <!-- Code lines -->
  <text x="576" y="82"  font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">// vite.config.ts</text>
  <text x="576" y="100" font-family="'Courier New', Courier, monospace" font-size="11" fill="#818cf8">import</text>
  <text x="618" y="100" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">{ i18nPlugin }</text>
  <text x="718" y="100" font-family="'Courier New', Courier, monospace" font-size="11" fill="#818cf8">from</text>
  <text x="576" y="116" font-family="'Courier New', Courier, monospace" font-size="11" fill="#38bdf8">  '@stackra/i18n/vite-plugin'</text>
  <text x="576" y="134" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">i18nPlugin({</text>
  <text x="576" y="152" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">  defaultLanguage:</text>
  <text x="700" y="152" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">'en'</text>
  <text x="576" y="168" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">  languages:</text>
  <text x="648" y="168" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">['en','ar','es']</text>
  <text x="576" y="184" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">  typeGeneration:</text>
  <text x="700" y="184" font-family="'Courier New', Courier, monospace" font-size="11" fill="#fb923c">true</text>
  <text x="576" y="200" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">  pattern:</text>
  <text x="630" y="200" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">'**/i18n/*.json'</text>
  <text x="576" y="218" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">})</text>
  <!-- Cursor blink -->
  <rect x="600" y="222" width="7" height="12" fill="#38bdf8" opacity="0.8" rx="1" />
</svg>
